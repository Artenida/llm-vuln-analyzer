llm:
  provider: openai
  model: gpt-4o-mini
  max_tokens: 2000
  temperature: 0          # deterministic output

ingestion:
  max_function_lines: 200
  skip_dirs:
    - node_modules
    - .git
    - __pycache__
    - vendor
    - dist
    - build
    - .next
    - coverage

output:
  results_folder: experiments/results
  save_per_run: true