# LLM configuration
llm:
  provider: openai          # openai or anthropic
  model: gpt-4o-mini
  max_tokens: 2000
  temperature: 0

# Dataset configuration
dataset:
  folder: data/raw/juliet/juliet/Java/src/testcases
  limit: 10                 # how many samples to analyze per run, null = all

# Output configuration
output:
  folder: experiments/results
  save_raw_response: true   # save the raw LLM response in the JSON

# Evaluation configuration
evaluation:
  # Automatically run evaluation after every analyze run
  auto_evaluate: true
  # Where to save evaluation report JSONs (relative to project root)
  output_folder: experiments/results/evaluations
  # Minimum acceptable coverage — cli.py will print a warning if below this
  min_coverage_pct: 80