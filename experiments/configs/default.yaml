# LLM configuration
llm:
  provider: openai
  model: gpt-4o-mini
  max_tokens: 2000
  temperature: 0

# Dataset configuration
dataset:
  folder: data/raw/juliet/juliet/Java/src/testcases

  # limit_per_cwe: how many samples to take from each CWE folder.
  # Keeps the dataset balanced — prevents one large CWE from dominating metrics.
  # 20 gives ~320 samples across 16 CWEs (good for a first full run).
  # Set to null to take everything from every CWE.
  limit_per_cwe: 20

  # limit: hard cap on total samples across all CWEs (applied after limit_per_cwe).
  # Set to null to use all samples up to limit_per_cwe * number_of_CWEs.
  limit: null

# Output configuration
output:
  folder: experiments/results
  save_raw_response: true

# Evaluation configuration
evaluation:
  auto_evaluate: true
  output_folder: experiments/results/evaluations
  min_coverage_pct: 80